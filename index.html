    <style>
        .landing-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 20px 60px;
            min-height: 100vh;
        }
        .landing-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .landing-emoji {
            font-size: 3rem;
            margin-bottom: 12px;
            animation: bounce 2s ease-in-out infinite;
        }
        .landing-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .landing-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        .test-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .test-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-primary);
            box-shadow: 0 4px 24px rgba(192, 132, 252, 0.08);
            border: 1px solid rgba(192, 132, 252, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .test-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(192, 132, 252, 0.15);
        }
        .test-card-emoji {
            font-size: 2.5rem;
            flex-shrink: 0;
        }
        .test-card-info {
            flex: 1;
        }
        .test-card-title {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .test-card-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .test-card-arrow {
            font-size: 1.2rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .hot-badge {
            display: inline-block;
            background: linear-gradient(135deg, #C084FC, #F9A8D4);
            color: white;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .new-badge {
            display: inline-block;
            background: linear-gradient(135deg, #6EE7B7, #3B82F6);
            color: white;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .landing-footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
