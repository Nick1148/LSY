<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>찐테스트 - 나를 알아보는 바이럴 심리테스트</title>

    <!-- OG Tags -->
    <meta property="og:title" content="찐테스트 - 나를 알아보는 바이럴 심리테스트">
    <meta property="og:description" content="재미있는 심리테스트로 나를 알아보자! 🧠🔋">
    <meta property="og:type" content="website">

    <meta property="og:image" content="https://nick1148.github.io/LSY/viral-test/assets/og-brain-tabs.svg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="찐테스트">
    <meta name="twitter:description" content="재미있는 심리테스트로 나를 알아보자!">
    <meta name="twitter:image" content="https://nick1148.github.io/LSY/viral-test/assets/og-brain-tabs.svg">

    <!-- SEO -->
    <meta name="description" content="찐테스트 - 바이럴 심리테스트 모음. 뇌 속 브라우저 탭, 사회적 배터리 잔량 등 재미있는 테스트를 해보세요!">
    <meta name="keywords" content="심리테스트, 성격테스트, MBTI, 바이럴테스트, 뇌속탭, 사회적배터리">

    <!-- Pretendard Font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <link rel="stylesheet" href="shared/css/common.css">
    <link rel="stylesheet" href="shared/css/ad-slot.css">
    <style>
        /* === 랜딩 전용 스타일 (프리미엄) === */
        .landing-hero {
            min-height: 45vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
        }

        .landing-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(192, 132, 252, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(249, 168, 212, 0.06) 0%, transparent 50%);
            pointer-events: none;
            animation: heroBgPulse 8s ease-in-out infinite;
        }

        @keyframes heroBgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .landing-logo {
            font-size: 3.5rem;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 12px rgba(192, 132, 252, 0.2));
        }

        .landing-title {
            font-size: 2.4rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .landing-sub {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-weight: 500;
        }

        /* 참여자 수 뱃지 */
        .participant-count {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            font-size: 0.82rem;
            color: var(--neon-purple);
            margin-bottom: 32px;
            border: 1px solid rgba(192, 132, 252, 0.1);
            box-shadow: 0 2px 12px rgba(192, 132, 252, 0.06);
            font-weight: 600;
        }

        .participant-dot {
            width: 7px;
            height: 7px;
            background: var(--neon-green);
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
            box-shadow: 0 0 6px rgba(110, 231, 183, 0.4);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 테스트 카드 리스트 - 가로 스크롤 스토리 스타일 */
        .test-list {
            padding: 0 0 60px;
            max-width: 100%;
            margin: 0 auto;
        }

        .test-list h2 {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            padding: 0 20px;
        }

        .test-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding: 8px 20px 24px;
            scrollbar-width: none;
        }

        .test-scroll::-webkit-scrollbar {
            display: none;
        }

        /* 테스트 카드 (프리미엄 + 3D tilt) */
        .test-card {
            display: flex;
            flex-direction: column;
            min-width: 280px;
            max-width: 320px;
            flex-shrink: 0;
            padding: 28px 24px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1.5px solid rgba(192, 132, 252, 0.1);
            text-decoration: none;
            color: var(--text-primary);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(192, 132, 252, 0.06);
            scroll-snap-align: center;
            transform-style: preserve-3d;
            perspective: 800px;
        }

        .test-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-main);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .test-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(249, 168, 212, 0.08), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .test-card:hover {
            border-color: var(--neon-pink);
            box-shadow: 0 16px 40px rgba(192, 132, 252, 0.15);
        }

        .test-card:hover::before {
            opacity: 1;
        }

        .test-card:hover::after {
            opacity: 1;
        }

        .test-card:active {
            transform: scale(0.98);
        }

        .test-card .card-emoji {
            font-size: 3.2rem;
            margin-bottom: 14px;
            display: block;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.08));
        }

        .test-card .card-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 8px;
            display: block;
        }

        .test-card .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: block;
            line-height: 1.6;
            flex: 1;
        }

        .test-card .card-cta {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 24px;
            background: var(--gradient-main);
            border-radius: var(--radius-xl);
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(249, 168, 212, 0.2);
            align-self: flex-start;
        }

        .test-card:hover .card-cta {
            box-shadow: 0 4px 16px rgba(249, 168, 212, 0.3);
        }

        .test-card .card-meta {
            display: flex;
            gap: 12px;
            margin-top: 14px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .test-card .card-meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .test-card .card-participants {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.72rem;
            color: var(--neon-purple);
            font-weight: 600;
            margin-top: 8px;
            opacity: 0.8;
        }

        .test-card .card-participants .dot {
            width: 5px;
            height: 5px;
            background: var(--neon-green);
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }

        /* 스크롤 인디케이터 */
        .scroll-indicator {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 0 0 8px;
        }

        .scroll-dot {
            width: 6px;
            height: 6px;
            border-radius: 3px;
            background: rgba(192, 132, 252, 0.2);
            transition: all 0.3s ease;
        }

        .scroll-dot.active {
            width: 20px;
            background: var(--neon-purple);
        }

        .badge-hot {
            display: inline-block;
            padding: 3px 10px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            border-radius: 10px;
            margin-left: 8px;
            vertical-align: middle;
            letter-spacing: 0.5px;
            animation: hotPulse 2s ease-in-out infinite;
        }

        @keyframes hotPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.3); }
            50% { box-shadow: 0 0 0 4px rgba(255, 107, 107, 0); }
        }

        .badge-new {
            display: inline-block;
            padding: 3px 10px;
            background: var(--gradient-main);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            border-radius: 10px;
            margin-left: 8px;
            vertical-align: middle;
            letter-spacing: 0.5px;
        }

        /* 파티클 배경 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: var(--neon-purple);
            border-radius: 50%;
            opacity: 0.3;
            animation: particleFloat linear infinite;
        }

        /* 별 모양 파티클 */
        .particle.star {
            background: none;
            border-radius: 0;
            opacity: 0.4;
        }

        .particle.star::before {
            content: '✦';
            font-size: inherit;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* 푸터 */
        .landing-footer {
            text-align: center;
            padding: 24px 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .landing-footer a {
            color: var(--neon-purple);
            text-decoration: none;
        }

        /* Coming Soon 카드 */
        .test-card.coming-soon {
            opacity: 0.6;
            pointer-events: none;
        }

        .test-card.coming-soon .card-cta {
            background: rgba(192, 132, 252, 0.2);
            color: var(--text-muted);
        }

        /* 다크모드 - 랜딩 */
        [data-theme="dark"] .landing-hero::before {
            background: radial-gradient(circle at 30% 40%, rgba(212, 165, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(255, 184, 217, 0.06) 0%, transparent 50%);
        }

        [data-theme="dark"] .participant-count {
            background: rgba(42, 36, 56, 0.7);
            border-color: rgba(212, 165, 255, 0.1);
            color: var(--neon-purple);
        }

        [data-theme="dark"] .test-card {
            background: var(--bg-card);
            border-color: rgba(212, 165, 255, 0.1);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        [data-theme="dark"] .test-card:hover {
            border-color: var(--neon-pink);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
        }

        [data-theme="dark"] .particle {
            opacity: 0.15;
        }
    </style>
</head>
<body class="cute-theme">
    <button class="theme-toggle" id="themeToggle" aria-label="다크모드 전환">☀️</button>
    <!-- 파티클 배경 -->
    <div class="particles" id="particles"></div>

    <!-- 히어로 -->
    <div class="landing-hero">
        <div class="landing-logo">🧪</div>
        <h1 class="landing-title"><span class="text-gradient">찐테스트</span></h1>
        <p class="landing-sub">나를 알아보는 바이럴 심리테스트</p>
        <div class="participant-count">
            <span class="participant-dot"></span>
            <span id="participantCount">지금 테스트 하는 중!</span>
        </div>
    </div>

    <!-- 테스트 목록 -->
    <div class="test-list">
        <h2>어떤 테스트를 해볼까요? ✨</h2>

        <div class="test-scroll" id="testScroll">
            <a href="./brain-tabs/" class="test-card" data-tilt>
                <span class="card-emoji">🧠</span>
                <span class="card-title">
                    나의 뇌 속 브라우저 탭
                    <span class="badge-hot">HOT</span>
                </span>
                <span class="card-desc">당신의 뇌에는 지금 탭이 몇 개 열려있을까? 5개의 질문으로 알아보는 나의 사고 패턴</span>
                <span class="card-meta">
                    <span>⏱ 약 1분</span>
                    <span>📊 6가지 유형</span>
                </span>
                <span class="card-participants"><span class="dot"></span> <span class="count" data-base="8234">참여 중</span></span>
                <span class="card-cta">테스트 시작 →</span>
            </a>

            <a href="./social-battery/" class="test-card" data-tilt>
                <span class="card-emoji">🔋</span>
                <span class="card-title">
                    나의 사회적 배터리 잔량
                    <span class="badge-hot">HOT</span>
                </span>
                <span class="card-desc">당신의 사회적 배터리는 지금 몇 %? 충전 방법까지 알려드립니다</span>
                <span class="card-meta">
                    <span>⏱ 약 1분</span>
                    <span>📊 5가지 유형</span>
                </span>
                <span class="card-participants"><span class="dot"></span> <span class="count" data-base="4613">참여 중</span></span>
                <span class="card-cta">테스트 시작 →</span>
            </a>
        </div>

        <div class="scroll-indicator" id="scrollIndicator">
            <div class="scroll-dot active"></div>
            <div class="scroll-dot"></div>
        </div>

        <!-- 광고 슬롯 -->
        <div style="padding: 0 20px;"><div class="ad-slot" id="adSlotLanding"></div></div>
    </div>

    <!-- 푸터 -->
    <div class="landing-footer">
        <p>찐테스트 &copy; 2026 | 재미로 하는 테스트입니다</p>
    </div>

    <script src="shared/js/config.js"></script>
    <script src="shared/js/theme.js"></script>
    <script src="shared/js/ad-manager.js"></script>
    <script>
        // 파티클 생성 (별 모양 혼합)
        (function() {
            const container = document.getElementById('particles');
            const colors = ['#C084FC', '#F9A8D4', '#93C5FD', '#67E8F9', '#6EE7B7'];

            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                const isStar = Math.random() > 0.6;
                p.className = 'particle' + (isStar ? ' star' : '');
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (10 + Math.random() * 15) + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                p.style.fontSize = (0.5 + Math.random() * 0.8) + 'rem';

                if (!isStar) {
                    p.style.background = colors[Math.floor(Math.random() * colors.length)];
                    p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
                }
                container.appendChild(p);
            }
        })();

        // 참여자 수 카운트업 (전체)
        (function() {
            const el = document.getElementById('participantCount');
            const base = 12847;
            const random = Math.floor(Math.random() * 500);
            const total = base + random;

            let current = 0;
            const step = Math.ceil(total / 60);
            const counter = setInterval(() => {
                current += step;
                if (current >= total) {
                    current = total;
                    clearInterval(counter);
                }
                el.textContent = current.toLocaleString() + '명 참여 중!';
            }, 30);
        })();

        // 카드별 참여자수
        document.querySelectorAll('.card-participants .count').forEach(el => {
            const base = parseInt(el.dataset.base) + Math.floor(Math.random() * 300);
            el.textContent = base.toLocaleString() + '명 참여 중';
        });

        // 3D Tilt 효과
        document.querySelectorAll('[data-tilt]').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                const y = (e.clientY - rect.top) / rect.height;
                const rotateX = (0.5 - y) * 12;
                const rotateY = (x - 0.5) * 12;
                card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
                card.style.setProperty('--mouse-x', (x * 100) + '%');
                card.style.setProperty('--mouse-y', (y * 100) + '%');
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = '';
            });
        });

        // 스크롤 인디케이터
        (function() {
            const scroll = document.getElementById('testScroll');
            const dots = document.querySelectorAll('#scrollIndicator .scroll-dot');
            if (!scroll || dots.length === 0) return;

            scroll.addEventListener('scroll', () => {
                const scrollLeft = scroll.scrollLeft;
                const maxScroll = scroll.scrollWidth - scroll.clientWidth;
                const ratio = maxScroll > 0 ? scrollLeft / maxScroll : 0;
                const activeIndex = Math.round(ratio * (dots.length - 1));
                dots.forEach((d, i) => d.classList.toggle('active', i === activeIndex));
            });
        })();

        // 광고 초기화
        AdManager.init();
    </script>
</body>
</html>
