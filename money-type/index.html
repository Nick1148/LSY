<body class="cute-theme">
    <button class="theme-toggle" id="themeToggle" aria-label="다크모드 전환">☀️</button>

        </div>
        <div class="progress-text" id="progressText">1 / 5</div>
    </div>

    <!-- 시작 화면 -->
    <div class="container">
        <div class="start-screen" id="startScreen">
            <div class="start-emoji">💰</div>

            <div class="calc-progress"><div class="calc-progress-fill" id="calcProgress"></div></div>

        <div id="resultArea" style="display:none;">
        </div>
