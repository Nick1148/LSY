    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">

    <meta name="twitter:description" content="당신의 사회적 배터리는 지금 몇 %? 🔋">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <!-- html2canvas -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>

    <link rel="stylesheet" href="../shared/css/common.css">
    <link rel="stylesheet" href="../shared/css/ad-slot.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 프로그레스 바 -->
    <div class="progress-container" id="progressContainer" style="display:none;">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-text" id="progressText">1 / 5</div>
    </div>

    <div class="container">
        <!-- 시작 화면 -->
        <div class="start-screen" id="startScreen">
            <div class="start-emoji">🔋</div>
            <h1 class="start-title">
                나의 사회적<br><span class="text-gradient">배터리 잔량</span>
            </h1>
            <p class="start-description">
                당신의 사회적 배터리는 지금 몇 %?<br>
                5개의 질문으로 알아보는 나의 사회적 에너지
            </p>
            <button class="start-btn" id="startBtn">테스트 시작하기</button>
            <p style="margin-top:16px; font-size:0.8rem; color:var(--text-muted);">약 1분 소요</p>
        </div>

        <!-- 질문 영역 -->
        <div id="questionArea" style="display:none; padding-top:60px; min-height:100vh;"></div>

        <!-- 계산 중 화면 -->
        <div class="calculating-screen" id="calcScreen">
            <div class="calc-spinner"></div>
            <p class="calc-text">배터리 잔량을 측정하고 있습니다...</p>
        </div>

        <!-- 결과 화면 -->
        <div id="resultArea" style="display:none;"></div>
    </div>

    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/share.js"></script>
    <script src="../shared/js/ad-manager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
