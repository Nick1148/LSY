<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>찐테스트 - 나를 알아보는 바이럴 심리테스트</title>

    <!-- OG Tags -->
    <meta property="og:title" content="찐테스트 - 나를 알아보는 바이럴 심리테스트">
    <meta property="og:description" content="재미있는 심리테스트로 나를 알아보자! 🧠🔋">
    <meta property="og:type" content="website">

    <meta property="og:image" content="https://nick1148.github.io/LSY/viral-test/assets/og-brain-tabs.svg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="찐테스트">
    <meta name="twitter:description" content="재미있는 심리테스트로 나를 알아보자!">
    <meta name="twitter:image" content="https://nick1148.github.io/LSY/viral-test/assets/og-brain-tabs.svg">

    <!-- SEO -->
    <meta name="description" content="찐테스트 - 바이럴 심리테스트 모음. 뇌 속 브라우저 탭, 사회적 배터리 잔량 등 재미있는 테스트를 해보세요!">
    <meta name="keywords" content="심리테스트, 성격테스트, MBTI, 바이럴테스트, 뇌속탭, 사회적배터리">

    <!-- Pretendard Font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <link rel="stylesheet" href="shared/css/common.css">
    <link rel="stylesheet" href="shared/css/ad-slot.css">
    <style>
        /* === 랜딩 전용 스타일 === */
        .landing-hero {
            min-height: 50vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
        }

        .landing-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(168, 85, 247, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .landing-logo {
            font-size: 3rem;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }

        .landing-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .landing-sub {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        /* 테스트 카드 리스트 */
        .test-list {
            padding: 0 20px 60px;
            max-width: 480px;
            margin: 0 auto;
        }

        .test-list h2 {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            text-align: center;
        }

        .test-card {
            display: block;
            padding: 28px 24px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-decoration: none;
            color: var(--text-primary);
            transition: all var(--transition-fast);
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .test-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-main);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .test-card:hover {
            border-color: var(--neon-purple);
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
        }

        .test-card:hover::before {
            opacity: 1;
        }

        .test-card .card-emoji {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: block;
        }

        .test-card .card-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 8px;
            display: block;
        }

        .test-card .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: block;
            line-height: 1.5;
        }

        .test-card .card-cta {
            display: inline-block;
            margin-top: 16px;
            padding: 8px 20px;
            background: var(--gradient-main);
            border-radius: var(--radius-xl);
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
        }

        .badge-new {
            display: inline-block;
            padding: 3px 10px;
            background: var(--neon-pink);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 10px;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* 파티클 배경 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--neon-purple);
            border-radius: 50%;
            opacity: 0.3;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* 푸터 */
        .landing-footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .landing-footer a {
            color: var(--neon-purple);
            text-decoration: none;
        }

        /* 참여자 수 (가상) */
        .participant-count {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(168, 85, 247, 0.1);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--neon-purple);
            margin-bottom: 32px;
        }

        .participant-dot {
            width: 6px;
            height: 6px;
            background: var(--neon-green);
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <!-- 파티클 배경 -->
    <div class="particles" id="particles"></div>

    <!-- 히어로 -->
    <div class="landing-hero">
        <div class="landing-logo">🧪</div>
        <h1 class="landing-title"><span class="text-gradient">찐테스트</span></h1>
        <p class="landing-sub">나를 알아보는 바이럴 심리테스트</p>
        <div class="participant-count">
            <span class="participant-dot"></span>
            <span id="participantCount">지금 테스트 하는 중!</span>
        </div>
    </div>

    <!-- 테스트 목록 -->
    <div class="test-list">
        <h2>어떤 테스트를 해볼까요?</h2>

        <a href="./brain-tabs/" class="test-card">
            <span class="card-emoji">🧠</span>
            <span class="card-title">
                나의 뇌 속 브라우저 탭
                <span class="badge-new">NEW</span>
            </span>
            <span class="card-desc">당신의 뇌에는 지금 탭이 몇 개 열려있을까? 5개의 질문으로 알아보는 나의 사고 패턴</span>
            <span class="card-cta">테스트 시작 →</span>
        </a>

        <a href="./social-battery/" class="test-card">
            <span class="card-emoji">🔋</span>
            <span class="card-title">
                나의 사회적 배터리 잔량
                <span class="badge-new">NEW</span>
            </span>
            <span class="card-desc">당신의 사회적 배터리는 지금 몇 %? 충전 방법까지 알려드립니다</span>
            <span class="card-cta">테스트 시작 →</span>
        </a>

        <!-- 광고 슬롯 -->
        <div class="ad-slot" id="adSlotLanding"></div>
    </div>

    <!-- 푸터 -->
    <div class="landing-footer">
        <p>찐테스트 &copy; 2026 | 재미로 하는 테스트입니다</p>
    </div>

    <script src="shared/js/config.js"></script>
    <script src="shared/js/ad-manager.js"></script>
    <script>
        // 파티클 생성
        (function() {
            const container = document.getElementById('particles');
            const colors = ['#a855f7', '#ec4899', '#3b82f6', '#06b6d4'];

            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (8 + Math.random() * 12) + 's';
                p.style.animationDelay = Math.random() * 8 + 's';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
                container.appendChild(p);
            }
        })();

        // 광고 초기화
        AdManager.init();
    </script>
</body>
</html>
